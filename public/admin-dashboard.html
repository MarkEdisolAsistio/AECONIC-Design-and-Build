<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard Workspace | AECONIC Design and Build</title>
    
    <link rel="icon" type="image/jpeg" href="AECONIC-LOGO.jpg">
    
    <link rel="stylesheet" href="webdesign.css">
    <link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet">
    <style>
        /* Isolated Admin Header Bar styling to avoid core template style collisions */
        .admin-navbar {
            background-color: #292524;                 
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px; 
            border-bottom: 1px solid #1c1917;
            width: 100%;
            min-height: 68px;
            box-sizing: border-box;
            position: relative;
        }

        .admin-company-logo {
            display: flex;
            align-items: center;
            gap: 12px; /* Smooth spacing between logo and text title */
        }

        /* Forces admin header logo image to fit nicely within the navbar track dimensions */
        .admin-logo-img {
            height: 38px;
            width: auto;
            display: block;
            object-fit: contain;
            border-radius: 4px;
        }

        /* Dual-line stacked workspace typography representation matching frontend styling rules */
        .admin-logo-text {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            line-height: 1.2;
        }
        .admin-brand-bold {
            font-size: 18px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.5px;
        }
        .admin-brand-light {
            font-size: 12px;
            font-weight: 400;
            color: #d6d3d1;
        }

        /* Responsive Mobile Layout Navigation Structural Shell Wrapper Link Aggregators */
        .admin-nav-menu-wrapper {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .admin-logout-btn {
            background-color: #ffffff;
            color: #292524 !important;
            padding: 8px 18px;
            border-radius: 4px;
            font-weight: bold;
            text-decoration: none;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .admin-logout-btn:hover {
            background-color: #292524;
            color: #ffffff !important;
            outline: 1px solid #ffffff;
        }

        /* Sub-Navbar Configuration Layout */
        .sub-navbar {
            background-color: #f3f4f6;
            border-bottom: 1px solid #d1d5db;
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        .sub-navbar button {
            padding: 8px 16px;
            border: 1px solid #d1d5db;
            background: white;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 4px;
            color: #4b5563;
            font-weight: 500;
            transition: all 0.2s;
        }
        .sub-navbar button.active {
            background: #374151;
            color: white;
            border-color: #374151;
            font-weight: bold;
        }
        .sub-navbar button:hover:not(.active) {
            background-color: #e5e7eb;
        }

        /* Preview Toggle Match Core Theme Palette */
        .preview-trigger-btn {
            background: #374151 !important;
            color: white !important;
            border-color: #374151 !important;
            font-weight: bold;
            white-space: nowrap;
        }
        .preview-trigger-btn:hover {
            background: #1f2937 !important;
        }

        /* Dynamic Main Workspace Grid Setup */
        .dashboard-container {
            max-width: 100%;
            margin: 20px;
            display: flex;
            gap: 20px;
            height: calc(100vh - 140px);
        }
        
        /* Left Hand Side Input Board Form Panel */
        .main-panel {
            flex: 1;
            background: white;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        /* Right Hand Side Live Preview Container */
        .preview-panel {
            display: none;
        }

        /* Active Full Screen Layout Override Rules */
        .preview-panel.show-preview {
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #e5e5e5;
            z-index: 9999;
            padding: 0;
        }

        /* Fixed Top Action Bar for Full Screen Preview Mode */
        .preview-header {
            background: #374151;
            color: white;
            padding: 12px 20px;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .close-preview-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: inherit;
            transition: background 0.2s;
        }
        .close-preview-btn:hover {
            background: #dc2626;
        }

        .preview-iframe {
            width: 100%;
            flex: 1;
            border: none;
            background: #e5e5e5;
        }
        
        .input-box {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px 0;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-family: inherit;
        }
        #editor-container {
            height: 280px;
            margin: 8px 0 20px 0;
            border-radius: 0 0 4px 4px;
        }
        .ql-toolbar {
            border-radius: 4px 4px 0 0;
            background-color: #f9fafb;
        }
        .action-btn {
            padding: 10px 20px;
            background: #374151;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
        }
        .cancel-btn {
            padding: 10px 20px;
            background: #9ca3af;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
            display: none;
        }
        
        /* Modified layout loop row properties to include handles safely */
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid #e5e7eb;
            cursor: grab;
            gap: 15px;
            transition: transform 0.15s ease, background-color 0.15s ease;
        }
        .item-row:active {
            cursor: grabbing;
        }
        .item-row.dragging {
            opacity: 0.5;
            background-color: #f3f4f6;
            border: 1px dashed #9ca3af;
        }
        
        /* Visual Grab Handler Elements */
        .drag-handle-grip {
            color: #9ca3af;
            font-weight: bold;
            font-size: 16px;
            letter-spacing: 1px;
            user-select: none;
            cursor: grab;
        }
        .item-row:active .drag-handle-grip {
            cursor: grabbing;
        }
        .item-details-column {
            flex: 1;
            text-align: left;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }
        .edit-btn {
            color: #2563eb;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: bold;
        }
        .delete-btn {
            color: #dc2626;
            border: none;
            background: transparent;
            cursor: pointer;
            font-weight: bold;
        }

        /* UI Alignment Rules for Custom Font List Picker inside Admin Workspace */
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="georgia"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="georgia"]::before {
            content: 'Georgia' !important;
            font-family: 'Georgia', serif;
        }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="arial"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="arial"]::before {
            content: 'Arial' !important;
            font-family: 'Arial', sans-serif;
        }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="times-new-roman"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="times-new-roman"]::before {
            content: 'Times New Roman' !important;
            font-family: 'Times New Roman', Times, serif;
        }
        .ql-snow .ql-picker.ql-font .ql-picker-label[data-value="courier-new"]::before,
        .ql-snow .ql-picker.ql-font .ql-picker-item[data-value="courier-new"]::before {
            content: 'Courier New' !important;
            font-family: 'Courier New', Courier, monospace;
        }

        /* ========================================================
            QUILL TOOLBAR SINGLE LINE & TEXT WRAP OVERRIDES
            ======================================================== */
        .ql-toolbar.ql-snow {
            padding: 8px 12px !important;
            background-color: #f9fafb;
            border-radius: 4px 4px 0 0;
        }

        /* Sets a width constraint that naturally wraps text over multiple lines cleanly */
        .ql-snow .ql-toolbar .ql-picker.ql-font {
            width: 125px !important;
            margin-right: 15px !important;
        }

        /* Restores clean multi-line wrapping and centers typography selection text labels */
        .ql-snow .ql-toolbar .ql-picker.ql-font .ql-picker-label {
            padding-left: 4px !important;
            padding-right: 18px !important; 
            text-align: center !important;
            white-space: normal !important; 
            line-height: 1.2 !important;
            display: block !important;
        }

        /* Spacers to give size menus clean distance separation metrics */
        .ql-snow .ql-toolbar .ql-picker.ql-size {
            width: 95px !important;
            margin-right: 12px !important;
        }

        /* Adds distance padding clusters between individual format menu blocks */
        .ql-snow .ql-toolbar .ql-formats {
            margin-right: 12px !important;
        }

        /* ========================================================
            QUILL TEXT EDITOR CUSTOM FONT CANVAS MAPPING OPTIONS
            ======================================================== */
        /* Assign active typography render rules directly inside the typing canvas */
        .ql-container .ql-editor .ql-font-georgia,
        .ql-editor .ql-font-georgia { font-family: 'Georgia', Georgia, serif !important; }
        
        .ql-container .ql-editor .ql-font-arial,
        .ql-editor .ql-font-arial { font-family: 'Arial', Helvetica, sans-serif !important; }
        
        .ql-container .ql-editor .ql-font-times-new-roman,
        .ql-container .ql-font-times-new-roman { font-family: 'Times New Roman', Times, serif !important; }
        
        .ql-container .ql-editor .ql-font-courier-new,
        .ql-editor .ql-font-courier-new { font-family: 'Courier New', Courier, monospace !important; }

        /* ========================================================
            QUILL PICKER DROPDOWN BLUE STICKY HIGHLIGHT BLUR FIX
            ======================================================== */
        /* Resets the sticky browser focus ring on picker buttons after interaction selection clicks */
        .ql-snow .ql-toolbar .ql-picker:focus {
            outline: none !important;
        }
        .ql-snow .ql-toolbar .ql-picker-label:focus {
            outline: none !important;
            color: #444444 !important;
        }
        .ql-snow .ql-toolbar .ql-picker.ql-expanded .ql-picker-label {
            border-color: #ccc !important;
        }

        /* ========================================================
            ADMIN MOBILE NAVIGATION COMPONENT MECHANICS OVERRIDES
            ======================================================== */
        .admin-menu-toggle-checkbox {
            display: none;
        }
        .admin-hamburger-label {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 3000;
        }
        .admin-hamburger-label span {
            display: block;
            width: 25px;
            height: 3px;
            background-color: #ffffff;
            border-radius: 2px;
            transition: transform 0.3s ease, opacity 0.3s ease;
        }

        @media screen and (max-width: 768px) {
            .admin-navbar {
                padding: 10px 20px;
            }
            .admin-hamburger-label {
                display: flex;
            }

            /* Responsive Mobile Drawer - Smoothly collects subnav actions & tabs */
            .admin-nav-menu-wrapper {
                position: fixed;
                top: 68px;
                left: 0;
                width: 100%;
                height: calc(100vh - 68px);
                background-color: #292524;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                padding: 40px 24px;
                gap: 24px;
                overflow-y: auto;
                transform: translateX(100%);
                transition: transform 0.3s ease-in-out;
                z-index: 2500;
            }

            /* Checkbox State Engine Toggles drawer into view frame visibility */
            .admin-menu-toggle-checkbox:checked ~ .admin-nav-menu-wrapper {
                transform: translateX(0);
            }

            /* Transform horizontal lines cleanly into an 'X' close handle tracking interaction */
            .admin-menu-toggle-checkbox:checked ~ .admin-hamburger-label span:nth-child(1) {
                transform: translateY(8px) rotate(45deg);
            }
            .admin-menu-toggle-checkbox:checked ~ .admin-hamburger-label span:nth-child(2) {
                opacity: 0;
            }
            .admin-menu-toggle-checkbox:checked ~ .admin-hamburger-label span:nth-child(3) {
                transform: translateY(-8px) rotate(-45deg);
            }

            /* Sub-Navbar acts as standard flex wrapper container on mobile screens */
            .sub-navbar {
                display: none; /* Subnavbar layout layer disappears on mobile frame view */
            }

            /* Move selection button lists directly into the vertical core dashboard tray menu links */
            .admin-nav-menu-wrapper .nav-tabs {
                flex-direction: column;
                width: 100%;
                gap: 15px;
            }

            .admin-nav-menu-wrapper .nav-tabs button {
                width: 100%;
                padding: 12px;
                font-size: 16px;
                background-color: transparent;
                color: #d6d3d1;
                border: 1px solid #44403c;
                text-align: center;
            }

            .admin-nav-menu-wrapper .nav-tabs button.active {
                background: #374151;
                color: white;
                border-color: #374151;
            }

            .admin-nav-menu-wrapper .nav-actions {
                width: 100%;
                margin-top: 10px;
                border-top: 1px solid #44403c;
                padding-top: 25px;
                display: flex;
                flex-direction: column;
                gap: 15px;
            }

            .admin-nav-menu-wrapper .preview-trigger-btn {
                width: 100%;
                text-align: center;
                padding: 14px !important;
                font-size: 16px;
            }

            .admin-logout-btn {
                width: 100%;
                text-align: center;
                padding: 14px !important;
                font-size: 16px;
                box-sizing: border-box;
            }

            .dashboard-container {
                margin: 15px;
                height: auto;
                flex-direction: column;
            }
            .main-panel {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <header class="admin-navbar">
        <div class="admin-company-logo">
            <img src="AECONIC-LOGO.jpg" alt="AECONIC Logo" class="admin-logo-img">
            <div class="admin-logo-text">
                <span class="admin-brand-bold">AECONIC</span>
                <span class="admin-brand-light">Webpage Management Center</span>
            </div>
        </div>

        <input type="checkbox" id="admin-menu-toggle" class="admin-menu-toggle-checkbox">
        
        <label for="admin-menu-toggle" class="admin-hamburger-label">
            <span></span>
            <span></span>
            <span></span>
        </label>

        <div class="admin-nav-menu-wrapper">
            <div class="nav-tabs" id="mobile-tabs-container">
                <button onclick="switchTab('projects'); closeMobileMenu();" id="btn-projects" class="active">Projects</button>
                <button onclick="switchTab('story'); closeMobileMenu();" id="btn-story">Our Story</button>
                <button onclick="switchTab('services'); closeMobileMenu();" id="btn-services">Our Services</button>
                <button onclick="switchTab('awards'); closeMobileMenu();" id="btn-awards">Awards</button>
                <button onclick="switchTab('news'); closeMobileMenu();" id="btn-news">News & Updates</button>
                <button onclick="switchTab('blogs'); closeMobileMenu();" id="btn-blogs">Blog Articles</button>
                <button onclick="switchTab('events'); closeMobileMenu();" id="btn-events">Events</button>
                <button onclick="switchTab('careers'); closeMobileMenu();" id="btn-careers">Careers</button>
            </div>
            <div class="nav-actions">
                <button onclick="togglePreviewPane(true); closeMobileMenu();" class="preview-trigger-btn">👁️ Fullscreen Preview</button>
            </div>
            <a href="/admin-logout" class="admin-logout-btn">Log Out</a>
        </div>
    </header>

    <div class="sub-navbar" id="desktop-sub-navbar">
        </div>

    <div class="dashboard-container">
        <div class="main-panel">
            <h2 id="panel-title" style="margin-bottom: 20px; color: #111827;">Manage Projects</h2>
            <form id="managerForm" enctype="multipart/form-data">
                <input type="hidden" id="itemId" name="id">
                
                <label style="font-weight: bold;">Title / Heading Entry</label>
                <input type="text" id="contentTitle" name="title" class="input-box" required>
                
                <div id="dateFormGroup">
                    <label style="font-weight: bold; color: #374151; display: block; margin-top: 5px;">Date</label>
                    <input type="date" id="contentDate" name="itemDate" class="input-box" required>
                </div>
                
                <label style="font-weight: bold; margin-top: 10px; display: block;">Description</label>
                <div id="editor-container"></div>

                <label style="font-weight: bold; color: #374151; margin-top: 10px; display: block;">Upload Video (Up to 1.5GB)</label>
                <input type="file" id="heavyVideo" name="heavyVideo" class="input-box" accept="video/*" style="border: 1px dashed #374151; padding: 12px; background: #f9fafb;">

                <div id="uploadProgress" style="display:none; color:#2563eb; font-weight:bold; margin-bottom:15px; font-size:14px;">
                    ⏳ Uploading file... Please keep this page open.
                </div>

                <button type="submit" id="submitBtn" class="action-btn">Upload</button>
                <button type="button" id="cancelBtn" class="cancel-btn" onclick="resetFormState()">Cancel Edit</button>
            </form>
            <hr style="margin: 30px 0; border: 0; border-top: 1px solid #e5e7eb;">
            <h3>Active Content List</h3>
            <div id="itemsContainer" style="margin-top: 15px;"></div>
        </div>

        <div id="previewPane" class="preview-panel">
            <div class="preview-header">
                <span>Live Website Page Preview Mode</span>
                <button onclick="togglePreviewPane(false)" class="close-preview-btn">❌ Close Fullscreen</button>
            </div>
            <iframe id="liveFrame" class="preview-iframe" src="/projects.html"></iframe>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
    <script>
        // Register custom fonts into the Quill core engine whitelist matrix
        const Font = Quill.import('formats/font');
        Font.whitelist = [false, 'georgia', 'arial', 'times-new-roman', 'courier-new'];
        Quill.register(Font, true);

        let currentCategory = 'projects';
        let quill;

        // Dynamic initialization responsive layout DOM handler sync mechanism
        function setupResponsiveNavigationLayout() {
            const isMobile = window.innerWidth <= 768;
            const desktopSubNavbar = document.getElementById('desktop-sub-navbar');
            const mobileTabsContainer = document.getElementById('mobile-tabs-container');
            const navActions = document.querySelector('.admin-nav-menu-wrapper .nav-actions');

            if (!isMobile) {
                // Move elements safely back to standard Desktop tracks
                if (mobileTabsContainer && mobileTabsContainer.parentElement === document.querySelector('.admin-nav-menu-wrapper')) {
                    desktopSubNavbar.appendChild(mobileTabsContainer);
                    desktopSubNavbar.appendChild(navActions);
                    desktopSubNavbar.style.display = "flex";
                }
            } else {
                // Return structure contexts directly inside standard responsive navigation tray contexts
                const wrapper = document.querySelector('.admin-nav-menu-wrapper');
                if (mobileTabsContainer && mobileTabsContainer.parentElement === desktopSubNavbar) {
                    wrapper.insertBefore(mobileTabsContainer, wrapper.querySelector('.nav-actions'));
                    wrapper.insertBefore(navActions, wrapper.querySelector('.admin-logout-btn'));
                    desktopSubNavbar.style.display = "none";
                }
            }
        }

        // Helper interface click utility closes drawer window views elegantly
        function closeMobileMenu() {
            document.getElementById('admin-menu-toggle').checked = false;
        }

        window.addEventListener('resize', setupResponsiveNavigationLayout);

        document.addEventListener("DOMContentLoaded", () => {
            setupResponsiveNavigationLayout();
            
            quill = new Quill('#editor-container', {
                theme: 'snow',
                modules: {
                    toolbar: [
                        [
                            { 'font': [false, 'georgia', 'arial', 'times-new-roman', 'courier-new'] }, 
                            { 'size': ['small', false, 'large', 'huge'] },
                            'bold', 'italic', 'underline', 'strike',
                            { 'color': [] }, { 'background': [] },
                            { 'list': 'ordered'}, { 'list': 'bullet' },
                            { 'align': [] },
                            'link', 'image', 'video',
                            'clean'
                        ]
                    ]
                }
            });
            loadCurrentContent();
        });

        function togglePreviewPane(shouldShow) {
            const pane = document.getElementById('previewPane');
            if (shouldShow) {
                document.getElementById('liveFrame').contentWindow.location.reload();
                pane.classList.add('show-preview');
            } else {
                pane.classList.remove('show-preview');
            }
        }
        
        function switchTab(category) {
            currentCategory = category;
            document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
            // Update active state triggers concurrently on both structural layout types seamlessly
            document.querySelectorAll(`[id=btn-${category}]`).forEach(b => b.classList.add('active'));
            
            let displayTitle = category === 'story' ? 'Our Story' : (category === 'services' ? 'Our Services' : category.charAt(0).toUpperCase() + category.slice(1));
            document.getElementById('panel-title').innerText = `Manage ${displayTitle}`;
            
            const titleInput = document.getElementById('contentTitle');
            const dateGroup = document.getElementById('dateFormGroup');
            const dateInput = document.getElementById('contentDate');
            
            // Toggle requirements dynamically based on category types
            if (category === 'story' || category === 'services') {
                if (titleInput) titleInput.required = false;
                if (dateGroup && dateInput) {
                    dateGroup.style.display = 'none';
                    dateInput.required = false; 
                    dateInput.value = ''; 
                }
            } else {
                if (titleInput) titleInput.required = true;
                if (dateGroup && dateInput) {
                    dateGroup.style.display = 'block';
                    dateInput.required = true;
                }
            }
            
            const frame = document.getElementById('liveFrame');
            if (category === 'projects') frame.src = '/projects.html';
            else if (category === 'story') frame.src = '/about-story.html';
            else if (category === 'services') frame.src = '/about-services.html';
            else if (category === 'awards') frame.src = '/about-awards.html';
            else if (category === 'news') frame.src = '/news-updates.html';
            else if (category === 'blogs') frame.src = '/blog-articles.html';
            else if (category === 'events') frame.src = '/news-events.html';
            else if (category === 'careers') frame.src = '/careers.html';
            
            resetFormState();
            loadCurrentContent();
        }

        async function loadCurrentContent() {
            const syncQueryToken = currentCategory === 'services' ? 'values' : currentCategory;
            const res = await fetch('/api/content');
            const data = await res.json();
            const container = document.getElementById('itemsContainer');
            container.innerHTML = '';
            
            if (data[syncQueryToken]) {
                data[syncQueryToken].forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'item-row';
                    
                    // Added unique track IDs and drag triggers safely here
                    row.setAttribute('draggable', 'true');
                    row.setAttribute('data-id', item.id);
                    
                    let cleanTextPreview = item.desc.replace(/<\/?[^>]+(>|$)/g, "").substring(0, 90);
                    let videoBadge = item.videoPath ? `<span style="font-size:11px;background:#374151;color:white;padding:2px 6px;border-radius:4px;margin-left:8px;">VIDEO</span>` : '';
                    
                    let dateBadge = '';
                    if (currentCategory !== 'story' && currentCategory !== 'services' && item.itemDate) {
                        dateBadge = `<span style="font-size:11px; background:#e5e7eb; color:#4b5563; padding:2px 6px; border-radius:4px; margin-left:8px;">📅 ${item.itemDate}</span>`;
                    }
                    
                    // Injected the inline .drag-handle-grip and text alignment wrapper blocks smoothly
                    row.innerHTML = `
                        <div class="drag-handle-grip">⋮⋮</div>
                        <div class="item-details-column">
                            <strong>${item.title || '(No Title Entry)'}</strong>${videoBadge}${dateBadge}
                            <p style="font-size:13px;color:#6b7280;margin-top:4px;">${cleanTextPreview}...</p>
                        </div>
                        <div class="btn-group">
                            <button class="edit-btn" onclick="startEdit(${item.id}, '${escapeHtml(item.title || '')}')">Edit</button>
                            <button class="delete-btn" onclick="deleteItem(${item.id})">Remove</button>
                        </div>
                    `;
                    row.dataset.rawDesc = item.desc;
                    row.dataset.rawDate = item.itemDate || '';
                    container.appendChild(row);
                });
            }
        }

        document.getElementById('managerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const progressIndicator = document.getElementById('uploadProgress');
            
            submitBtn.disabled = true;
            submitBtn.innerText = "Streaming Payload...";
            progressIndicator.style.display = "block";

            const formData = new FormData();
            
            const itemIdVal = document.getElementById('itemId').value;
            if (itemIdVal && itemIdVal.trim() !== '') {
                formData.append('id', itemIdVal);
            }
            
            formData.append('title', document.getElementById('contentTitle').value);
            formData.append('itemDate', document.getElementById('contentDate').value);
            formData.append('desc', quill.getSemanticHTML());
            
            const fileInput = document.getElementById('heavyVideo');
            if (fileInput.files[0]) {
                formData.append('heavyVideo', fileInput.files[0]);
            }

            const targetRouteToken = currentCategory === 'services' ? 'values' : currentCategory;

            try {
                const res = await fetch(`/api/content/${targetRouteToken}`, {
                    method: 'POST',
                    body: formData
                });

                const result = await res.json();
                if (result.success) {
                    resetFormState();
                    loadCurrentContent();
                } else {
                    alert("Error: " + (result.error || "Failed to save data."));
                }
            } catch (err) {
                alert("Network timeout or stream failure.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Commit Entry Update";
                progressIndicator.style.display = "none";
                document.getElementById('heavyVideo').value = ""; 
            }
        });

        function startEdit(id, title) {
            const rows = document.querySelectorAll('.item-row');
            let matchedDesc = '';
            let matchedDate = '';
            
            rows.forEach(r => {
                if(r.innerHTML.includes(`startEdit(${id}`)) {
                    matchedDesc = r.dataset.rawDesc;
                    matchedDate = r.dataset.rawDate || '';
                }
            });

            document.getElementById('itemId').value = id;
            document.getElementById('contentTitle').value = title;
            document.getElementById('contentDate').value = matchedDate;
            quill.clipboard.dangerouslyPasteHTML(matchedDesc);
            
            document.getElementById('submitBtn').innerText = "Save Changes";
            document.getElementById('cancelBtn').style.display = "inline-block";
        }

        function resetFormState() {
            document.getElementById('itemId').value = '';
            document.getElementById('managerForm').reset();
            quill.setContents([]);
            document.getElementById('submitBtn').innerText = "Commit Entry Update";
            document.getElementById('cancelBtn').style.display = "none";
        }

        async function deleteItem(id) {
            if (confirm("Permanently remove this content entry item?")) {
                const targetRouteToken = currentCategory === 'services' ? 'values' : currentCategory;
                await fetch(`/api/content/${targetRouteToken}/${id}`, { method: 'DELETE' });
                loadCurrentContent();
            }
        }

        function escapeHtml(str) {
            return str.replace(/'/g, "\\'").replace(/"/g, '&quot;');
        }

        // ========================================================
        // GLOBAL DRAG AND DROP ENGINE CORE HOOKS
        // ========================================================
        const dndContainer = document.getElementById('itemsContainer');
        let activeDraggedRow = null;

        dndContainer.addEventListener("dragstart", (e) => {
            activeDraggedRow = e.target.closest(".item-row");
            if (activeDraggedRow) {
                activeDraggedRow.classList.add("dragging");
            }
        });

        dndContainer.addEventListener("dragend", async () => {
            if (activeDraggedRow) {
                activeDraggedRow.classList.remove("dragging");
                activeDraggedRow = null;
                
                // Track current arrangement sequence
                const standardRows = dndContainer.querySelectorAll(".item-row");
                const sortedSequenceIds = Array.from(standardRows).map(r => r.getAttribute("data-id"));
                
                const targetCategoryToken = currentCategory === 'services' ? 'values' : currentCategory;
                console.log(`Saving updated sequence index order [Category: ${targetCategoryToken}]:`, sortedSequenceIds);
                
                // Send the reordered sequence array live to the backend API route
                try {
                    const response = await fetch(`/api/content/${targetCategoryToken}/reorder`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ sequence: sortedSequenceIds })
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        // Dynamically refresh preview context iframe if it is currently visible
                        const previewPane = document.getElementById('previewPane');
                        if (previewPane.classList.contains('show-preview')) {
                            document.getElementById('liveFrame').contentWindow.location.reload();
                        }
                    } else {
                        console.error("Database reordering sync failed:", result.error);
                    }
                } catch (err) {
                    console.error("Network communication failure during sequence sync:", err);
                }
            }
        });

        dndContainer.addEventListener("dragover", (e) => {
            e.preventDefault();
            const boundingTarget = e.target.closest(".item-row");
            if (boundingTarget && boundingTarget !== activeDraggedRow) {
                const coordinates = boundingTarget.getBoundingClientRect();
                const preciseVerticalMidpoint = e.clientY - coordinates.top - coordinates.height / 2;
                
                if (preciseVerticalMidpoint > 0) {
                    boundingTarget.after(activeDraggedRow);
                } else {
                    boundingTarget.before(activeDraggedRow);
                }
            }
        });
    </script>
</body>
</html>
